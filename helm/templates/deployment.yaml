apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "annotations-api.fullname" . }}
  labels:
    app: {{ include "annotations-api.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "annotations-api.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "annotations-api.name" . }}
    spec:
      containers:
        - name: annotations-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.container.port }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}