replicaCount: 1

image:
  repository: ghcr.io/paidiver/brokerage-service-api
  tag: 0.0.1-a1
  pullPolicy: IfNotPresent

container:
  port: 8020

service:
  type: ClusterIP
  port: 80
  targetPort: 8020

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  runAsUser: 1001
  seccompProfile:
    type: RuntimeDefault

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "200m"
    memory: "256Mi"

ingress:
  enabled: false
  className: nginx
  host: fastapi.local
  path: /