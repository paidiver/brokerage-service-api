replicaCount: 1

image:
  repository: ghcr.io/paidiver/brokerage-service-api
  tag: 0.0.1-a3
  pullPolicy: IfNotPresent

container:
  port: 8020

service:
  type: ClusterIP
  port: 80
  targetPort: 8020

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  runAsUser: 1001
  seccompProfile:
    type: RuntimeDefault

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "200m"
    memory: "256Mi"

ingress:
  enabled: false
  className: nginx
  host: annotations-api.local
  path: /

env:
  fastapiRootPath: "/k8s/clusters/c-m-qvhg4xf9/api/v1/namespaces/paidiver-default/services/http:brokerage-service-api-annotations-api:80/proxy"