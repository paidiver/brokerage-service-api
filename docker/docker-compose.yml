services:
  app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    image: api:latest
    command: >
      bash -c "poetry run uvicorn brokerage_service_api.api.app:app
      --host 0.0.0.0
      --port 8020
      --reload"
    restart: always
    env_file:
      - ../.env
    volumes:
      - ../:/code:Z
    ports:
      - "8020:8020"
    depends_on:
      annotations_seed_data1:
        condition: service_completed_successfully
      annotations_seed_data2:
        condition: service_completed_successfully
      worms-cache:
        condition: service_healthy
      taxamatch:
        condition: service_started
    networks:
      - shared_services

  annotations_api1:
    image: ghcr.io/paidiver/annotations-api:latest
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: annotationsdb
      POSTGRES_HOST: annotations_api_db1
    restart: always
    depends_on:
      annotations_migrate1:
        condition: service_completed_successfully
    ports:
      - "8019:8000"
    command: python manage.py runserver 0.0.0.0:8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s = socket.create_connection(('localhost', 8000), 2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shared_services

  annotations_api2:
    image: ghcr.io/paidiver/annotations-api:latest
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: annotationsdb
      POSTGRES_HOST: annotations_api_db2
    restart: always
    depends_on:
      annotations_migrate2:
        condition: service_completed_successfully
    ports:
      - "8018:8000"
    command: python manage.py runserver 0.0.0.0:8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s = socket.create_connection(('localhost', 8000), 2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shared_services

  annotations_migrate1:
    image: ghcr.io/paidiver/annotations-api:latest
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: annotationsdb
      POSTGRES_HOST: annotations_api_db1
    restart: "no"
    depends_on:
      annotations_api_db1:
        condition: service_healthy
    command: python manage.py migrate
    networks:
      - shared_services

  annotations_migrate2:
    image: ghcr.io/paidiver/annotations-api:latest
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: annotationsdb
      POSTGRES_HOST: annotations_api_db2
    restart: "no"
    depends_on:
      annotations_api_db2:
        condition: service_healthy
    command: python manage.py migrate
    networks:
      - shared_services

  annotations_seed_data1:
    image: ghcr.io/paidiver/annotations-api:latest
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: annotationsdb
      POSTGRES_HOST: annotations_api_db1
    restart: "no"
    depends_on:
      annotations_api1:
        condition: service_healthy
      worms-cache-seed:
        condition: service_completed_successfully
    command: >
      bash -c '
        python manage.py shell -c "from django.apps import apps; Model = apps.get_model(\"api\", \"Annotation\"); raise SystemExit(0 if Model.objects.exists() else 42)"
        status=$$?

        if [ "$$status" -eq 0 ]; then
          echo "Annotations database already has data; skipping seed_demo_data"
        elif [ "$$status" -eq 42 ]; then
          echo "Annotations database is empty; running seed_demo_data"
          python manage.py seed_demo_data
        else
          echo "Database check failed with status $$status"
          exit "$$status"
        fi
      '
    networks:
      - shared_services

  annotations_seed_data2:
    image: ghcr.io/paidiver/annotations-api:latest
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: annotationsdb
      POSTGRES_HOST: annotations_api_db2
    restart: "no"
    depends_on:
      annotations_api2:
        condition: service_healthy
      worms-cache-seed:
        condition: service_completed_successfully
    command: >
      bash -c '
        python manage.py shell -c "from django.apps import apps; Model = apps.get_model(\"api\", \"Annotation\"); raise SystemExit(0 if Model.objects.exists() else 42)"
        status=$$?

        if [ "$$status" -eq 0 ]; then
          echo "Annotations database already has data; skipping seed_demo_data"
        elif [ "$$status" -eq 42 ]; then
          echo "Annotations database is empty; running seed_demo_data"
          python manage.py seed_demo_data
        else
          echo "Database check failed with status $$status"
          exit "$$status"
        fi
      '
    networks:
      - shared_services

  annotations_api_db1:
    image: postgis/postgis:16-3.5
    container_name: annotations_api_db1
    restart: always
    env_file:
      - ../.env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: annotationsdb
      POSTGRES_HOST: annotations_api_db1
    volumes:
      - annotations_pg_data1:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shared_services

  annotations_api_db2:
    image: postgis/postgis:16-3.5
    container_name: annotations_api_db2
    restart: always
    env_file:
      - ../.env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: annotationsdb
      POSTGRES_HOST: annotations_api_db2
    volumes:
      - annotations_pg_data2:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shared_services

  worms-db:
    image: postgres:18
    container_name: worms-cache-db
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: worms-cache-db
      POSTGRES_HOST: worms-db
    volumes:
      - worms_pg_data:/var/lib/postgresql
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shared_services

  worms-cache-migrate:
    image: ghcr.io/paidiver/worms-cache:latest
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: worms-cache-db
      POSTGRES_HOST: worms-db
    restart: "no"
    depends_on:
      worms-db:
        condition: service_healthy
    command: python manage.py migrate
    networks:
      - shared_services

  worms-cache:
    image: ghcr.io/paidiver/worms-cache:latest
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: worms-cache-db
      POSTGRES_HOST: worms-db
    restart: always
    depends_on:
      worms-cache-migrate:
        condition: service_completed_successfully
    ports:
      - "8017:8000"
    command: python manage.py runserver 0.0.0.0:8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s = socket.create_connection(('localhost', 8000), 2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shared_services

  worms-cache-seed:
    image: ghcr.io/paidiver/worms-cache:latest
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: worms-cache-db
      POSTGRES_HOST: worms-db
    restart: "no"
    depends_on:
      worms-cache:
        condition: service_healthy
    command: >
      bash -c '
        python manage.py shell -c "from django.apps import apps; Model = apps.get_model(\"api\", \"Taxon\"); raise SystemExit(0 if Model.objects.exists() else 42)"
        status=$$?

        if [ "$$status" -eq 0 ]; then
          echo "Worms cache database already has data; skipping ingest_worms"
        elif [ "$$status" -eq 42 ]; then
          echo "Worms cache database is empty; running ingest_worms"
          python manage.py ingest_worms --file initial_aphia_ids.txt --add-ranks
        else
          echo "Database check failed with status $$status"
          exit "$$status"
        fi
      '
    networks:
      - shared_services

  taxamatch:
    image: ghcr.io/paidiver/worms-cache:rb-latest
    environment:
      PORT: "8080"
      RACK_ENV: "development"
      PUMA_WORKERS: "1"
      PUMA_THREADS: "8"
      MAX_NAMES: "50"
      MAX_CANDIDATES_PER_NAME: "300"
    ports:
      - "8082:8080"
    restart: unless-stopped
    networks:
      - shared_services

volumes:
  annotations_pg_data1:
  annotations_pg_data2:
  worms_pg_data:

networks:
  shared_services:
    driver: bridge
