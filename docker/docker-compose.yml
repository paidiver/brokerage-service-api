services:
  app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    image: api:latest
    command: >
      bash -c "poetry run uvicorn brokerage_service_api.api.app:app
      --host 0.0.0.0
      --port 8020
      --reload"
    restart: always
    env_file:
      - ../.env
    volumes:
      - ../:/code:Z
    ports:
      - "8020:8020"
    depends_on:
      annotations-seed-data-jncc:
        condition: service_completed_successfully
      # annotations-seed-data-bodc:
      #   condition: service_completed_successfully
      worms-cache:
        condition: service_healthy
      taxamatch:
        condition: service_started
    networks:
      - shared_services

  annotations-api-jncc:
    image: ghcr.io/paidiver/annotations-api:latest
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: annotationsdb
      POSTGRES_HOST: annotations-api-db-jncc
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,annotations-api-bodc,annotations-api-jncc
    restart: always
    depends_on:
      annotations-migrate-jncc:
        condition: service_completed_successfully
    ports:
      - "8019:8000"
    command: python manage.py runserver 0.0.0.0:8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s = socket.create_connection(('localhost', 8000), 2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shared_services

  annotations-api-bodc:
    image: ghcr.io/paidiver/annotations-api:latest
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: annotationsdb
      POSTGRES_HOST: annotations-api-db-bodc
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,annotations-api-bodc,annotations-api-jncc
    restart: always
    depends_on:
      annotations-migrate-bodc:
        condition: service_completed_successfully
    ports:
      - "8018:8000"
    command: python manage.py runserver 0.0.0.0:8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s = socket.create_connection(('localhost', 8000), 2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shared_services

  annotations-migrate-jncc:
    image: ghcr.io/paidiver/annotations-api:latest
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: annotationsdb
      POSTGRES_HOST: annotations-api-db-jncc
    restart: "no"
    depends_on:
      annotations-api-db-jncc:
        condition: service_healthy
    command: python manage.py migrate
    networks:
      - shared_services

  annotations-migrate-bodc:
    image: ghcr.io/paidiver/annotations-api:latest
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: annotationsdb
      POSTGRES_HOST: annotations-api-db-bodc
    restart: "no"
    depends_on:
      annotations-api-db-bodc:
        condition: service_healthy
    command: python manage.py migrate
    networks:
      - shared_services

  annotations-seed-data-jncc:
    image: ghcr.io/paidiver/annotations-api:latest
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: annotationsdb
      POSTGRES_HOST: annotations-api-db-jncc
      API_BASE_URL: http://annotations-api-jncc:8000
    restart: "no"
    depends_on:
      annotations-api-jncc:
        condition: service_healthy
      worms-cache-migrate:
        condition: service_completed_successfully
    volumes:
      - ../examples:/app/examples:ro
      - ../tests:/app/tests:ro
    command: >
      bash -eu -o pipefail -c '
        if python manage.py shell -c "from django.apps import apps; Model = apps.get_model(\"api\", \"Annotation\"); raise SystemExit(0 if Model.objects.exists() else 42)"; then
          echo "Annotations database already has data; skipping ingest seed"
        else
          status=$$?

          if [ "$$status" -eq 42 ]; then
            echo "Annotations database is empty; creating user/token and running ingest_data"
            random_password=$$(openssl rand -base64 12)
            random_username=$$(openssl rand -hex 6)
            user_output=$$(python manage.py create_user_with_token "$$random_username" "$$random_password" 2>&1)
            echo "$$user_output"

            API_AUTH_TOKEN=$$(printf "%s\n" "$$user_output" | sed -n "s/.*API token.*: //p" | tail -n 1)

            if [ -z "$$API_AUTH_TOKEN" ]; then
              echo "Could not extract API token from create_user_with_token output"
              exit 1
            fi

            export API_AUTH_TOKEN
            export API_BASE_URL="http://annotations-api-jncc:8000"

            if [ -z "$$BASE_PATH" ]; then
              BASE_PATH="/app/examples"
            fi
            python /app/examples/ingest_data.py \
              "$$BASE_PATH/sample_jncc.json" \
              "$$BASE_PATH/sample_jncc_annotations.xlsx"
          else
            echo "Database check failed with status $$status"
            exit "$$status"
          fi
        fi
      '
    networks:
      - shared_services

  annotations-seed-data-bodc:
    image: ghcr.io/paidiver/annotations-api:latest
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: annotationsdb
      POSTGRES_HOST: annotations-api-db-bodc
      API_BASE_URL: http://annotations-api-bodc:8000
    restart: "no"
    depends_on:
      annotations-api-bodc:
        condition: service_healthy
      worms-cache-migrate:
        condition: service_completed_successfully
    volumes:
      - ../examples:/app/examples:ro
      - ../tests:/app/tests:ro
    command: >
      bash -eu -o pipefail -c '
        if python manage.py shell -c "from django.apps import apps; Model = apps.get_model(\"api\", \"Annotation\"); raise SystemExit(0 if Model.objects.exists() else 42)"; then
          echo "Annotations database already has data; skipping ingest seed"
        else
          status=$$?

          if [ "$$status" -eq 42 ]; then
            echo "Annotations database is empty; creating user/token and running ingest_data"
            random_password=$$(openssl rand -base64 12)
            random_username=$$(openssl rand -hex 6)
            user_output=$$(python manage.py create_user_with_token "$$random_username" "$$random_password" 2>&1)
            echo "$$user_output"

            API_AUTH_TOKEN=$$(printf "%s\n" "$$user_output" | sed -n "s/.*API token.*: //p" | tail -n 1)

            if [ -z "$$API_AUTH_TOKEN" ]; then
              echo "Could not extract API token from create_user_with_token output"
              exit 1
            fi

            export API_AUTH_TOKEN
            export API_BASE_URL="http://annotations-api-bodc:8000"
            if [ -z "$$BASE_PATH" ]; then
              BASE_PATH="/app/examples"
            fi
            python /app/examples/ingest_data.py \
              "$$BASE_PATH/sample_bodc.json" \
              "$$BASE_PATH/sample_bodc_annotations.xlsx"
          else
            echo "Database check failed with status $$status"
            exit "$$status"
          fi
        fi
      '
    networks:
      - shared_services

  annotations-api-db-jncc:
    image: postgis/postgis:16-3.5
    container_name: annotations-api-db-jncc
    restart: always
    env_file:
      - ../.env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: annotationsdb
      POSTGRES_HOST: annotations-api-db-jncc
    volumes:
      - annotations_pg_data_jncc:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shared_services

  annotations-api-db-bodc:
    image: postgis/postgis:16-3.5
    container_name: annotations-api-db-bodc
    restart: always
    env_file:
      - ../.env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: annotationsdb
      POSTGRES_HOST: annotations-api-db-bodc
    volumes:
      - annotations_pg_data_bodc:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shared_services

  worms-db:
    image: postgres:18
    container_name: worms-cache-db
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: worms-cache-db
      POSTGRES_HOST: worms-db
    volumes:
      - worms_pg_data:/var/lib/postgresql
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shared_services

  worms-cache-migrate:
    image: ghcr.io/paidiver/worms-cache:latest
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: worms-cache-db
      POSTGRES_HOST: worms-db
    restart: "no"
    depends_on:
      worms-db:
        condition: service_healthy
    command: python manage.py migrate
    networks:
      - shared_services

  worms-cache:
    image: ghcr.io/paidiver/worms-cache:latest
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: worms-cache-db
      POSTGRES_HOST: worms-db
    restart: always
    depends_on:
      worms-cache-migrate:
        condition: service_completed_successfully
    ports:
      - "8017:8000"
    command: python manage.py runserver 0.0.0.0:8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s = socket.create_connection(('localhost', 8000), 2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shared_services

  taxamatch:
    image: ghcr.io/paidiver/worms-cache:rb-latest
    environment:
      PORT: "8080"
      RACK_ENV: "development"
      PUMA_WORKERS: "1"
      PUMA_THREADS: "8"
      MAX_NAMES: "50"
      MAX_CANDIDATES_PER_NAME: "300"
    ports:
      - "8082:8080"
    restart: unless-stopped
    networks:
      - shared_services

volumes:
  annotations_pg_data_jncc:
  annotations_pg_data_bodc:
  worms_pg_data:

networks:
  shared_services:
    driver: bridge
