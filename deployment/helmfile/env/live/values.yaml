ingress:
  enabled: true
  host: brokerage-service-api.paidiver.site
  path: ""
  ingressClassName: "nginx"
  tls:
    - secretName: letsencrypt-brokerage-service-api
      hosts:
        - brokerage-service-api.paidiver.site
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-brokerage-service-api


env:
  bodcAnnotationsApiUrl: "https://annotations.bodc.ac.uk/api"
  jnccAnnotationsApiUrl: "https://annotations-api.paidiver.site/api"
