# Cluster issuer for the cert manager
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: __CLUSTER_ISSUER_NAME__
spec:
  acme:
    email: tobias.ferreira@noc.ac.uk
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: __CLUSTER_ISSUER_NAME__
    solvers:
    - http01:
        ingress:
          class: nginx
