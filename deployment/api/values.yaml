replicaCount: 1

image:
  repository: ghcr.io/paidiver/brokerage-service-api
  tag: 0.0.1-a3
  pullPolicy: IfNotPresent

imagePullSecrets: []

container:
  port: 8020

componentName: brokerage-service-api

service:
  type: ClusterIP
  port: 80
  targetPort: 8020

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  runAsUser: 1001
  seccompProfile:
    type: RuntimeDefault

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "200m"
    memory: "256Mi"

ingress:
  enabled: false

env:
  bodcAnnotationsApiUrl: "https://annotationsdev.bodc.ac.uk/api"
  jnccAnnotationsApiUrl: "https://annotations-api.paidiver.site"
