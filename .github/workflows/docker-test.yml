name: Build Docker Image

on:
  pull_request:
    branches:
    - main

env:
  CI_REGISTRY_IMAGE: ghcr.io/${{ github.repository }}
  RUN_LIVE_UPSTREAM_TESTS: "1"

jobs:
  test-docker:
    name: Build Test Environment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and Run Docker Image
        run: |
          cp .env.example .env
          echo "BASE_PATH=/app/tests/data" >> .env
          python -m json.tool tests/data/sample_jncc.json > /dev/null
          python -m json.tool tests/data/sample_bodc.json > /dev/null
          docker compose -f docker/docker-compose.yml build
          docker compose -f docker/docker-compose.yml --verbose up -d

      - name: Run Docker Tests
        run: |
          docker compose -f docker/docker-compose.yml run --rm app tox -e py313

      - name: Show Docker Compose status and logs
        if: always()
        run: |
          docker compose -f docker/docker-compose.yml ps -a
          docker compose -f docker/docker-compose.yml logs --no-color --timestamps --tail=300 annotations-seed-data-jncc || true
          docker compose -f docker/docker-compose.yml logs --no-color --timestamps --tail=300 || true
